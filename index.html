<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kessy’s Threads</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    /* NAVBAR */
    nav {
      background: black;
      color: white;
      padding: 15px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: gold;
    }

    /* HERO SECTION */
    .hero {
      height: 100vh;
      background:img src="FLAYER.jpg" alt="FLAYER" no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    .hero h1 {
      font-size: 3em;
    }

    .hero p {
      margin: 10px 0;
      font-size: 1.2em;
    }

    .btn {
      background: black;
      color: white;
      padding: 12px 25px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-top: 10px;
      display: inline-block;
    }

    .btn:hover {
      background: gold;
      color: black;
    }

    /* SECTIONS */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    /* PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .product {
      border: 1px solid #ddd;
      padding: 15px;
    }

    .product img {
      width: 100%;
      height: auto;
    }

    /* FOOTER */
    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
    }

  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="feedback.html">Feedback</a>
  </nav>

  <!-- PRODUCTS -->
  <section>
    <h2>Featured Products</h2>
    <div class="products">

      <div class="product">
        <img src="shirt.jpg">
        <h3>Shirt</h3>
        <p>P200</p>
        <button class="btn">Add to Cart</button>
      </div>

      <div class="product">
        <img src="dress.jpg">
        <h3>Dress</h3>
        <p>P300</p>
        <button class="btn">Add to Cart</button>


      <div class="product">
        <img src="jacket.jpg">
        <h3>Jacket</h3>
        <p>P350</p>
        <button class="btn">Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- HERO -->
   <section class="hero">
    <h1>Welcome to Kessy’s Threads</h1>
    <p>Your one-stop shop for stylish crochet clothing.</p>
    <a href="products.html" class="btn">Shop Now</a>
   </section>
  

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Kessy’s Threads</p>
  </footer>

</body>
<
