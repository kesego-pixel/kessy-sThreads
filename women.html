<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Women's Collection</title>

<body>

<header>
    <h1>Kessy's Threads</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<section>
    <h2>Women's Collection</h2>

    <article>
        <img src="images/dress.jpg" alt="Dress">
        <p> Dress - P300</p>
        <button onclick="addToCart('Dress', 300)">Add to Cart</button>
    </article>

    <article>
        <img src="images/top.jpg" alt="Top">
        <p> Top - P150</p>
        <button onclick="addToCart('Top', 150)">Add to Cart</button>
    </article>

    <article>
        <img src="images/skirt.jpg" alt="Skirt">
        <p>Skirt - P200</p>
        <button onclick="addToCart('Skirt', 200)">Add to Cart</button>
    </article>

    <article>
        <img src="images/ Bucket_Hat_.jpg" alt="Sun Hat">
        <p>Sun hat - P150</p>
        <button onclick="addToCart('Sun hat', 150)">Add to Cart</button>

    </article>

    <article>
        <img src="images/shrug.jpg" alt="Shrug">
        <p>Shrug - P150</p>
        <button onclick="addToCart('Shrug', 150)">Add to Cart</button>
    </article>

    <article>
        <img src="images/beach wear.jpg" alt="Beach Wear">
        <p>Bikini Set - P300</p>
        <button onclick="addToCart('Bikini Set', 300)">Add to Cart</button>
    </article>
</section>

<script>
function addToCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({ name: name, price: price });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert(name + " added to cart!");
}
</script>
